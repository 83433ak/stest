<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>不想上班评级表（问卷版）</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial;margin:0;background:#0f172a;color:#e6eef8;overflow-x:hidden;}
    .wrap{max-width:700px;margin:40px auto;padding:24px;background:#111b2b;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.4);transition:all .6s ease;}
    h1{text-align:center;font-size:22px;margin-bottom:10px}
    p{text-align:center;color:#9aa4b2;font-size:14px}
    form{margin-top:24px;opacity:1;transition:opacity .6s ease;}
    .fade-out{opacity:0;pointer-events:none;transform:translateY(-20px);}
    .q{margin-bottom:20px;padding:12px;background:rgba(255,255,255,0.03);border-radius:8px}
    .q h3{margin:0 0 8px;font-size:16px}
    label{display:block;margin:4px 0;cursor:pointer}
    input[type=radio]{margin-right:6px}
    button{margin-top:10px;padding:10px 18px;border:0;border-radius:8px;background:#ffb86b;color:#111;font-weight:600;cursor:pointer;transition:all .3s}
    button:hover{opacity:0.85;}
    #result{display:none;opacity:0;margin-top:24px;text-align:center;padding:16px;border-radius:10px;background:rgba(255,255,255,0.05);transition:opacity .6s ease;}
    #result.show{display:block;opacity:1;}
    #result h2{margin:0;font-size:20px}
    #result p{color:#9aa4b2}
    #restart{margin-top:20px;background:#3b82f6;color:#fff;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>不想上班评级表</h1>
    <p>选择最符合你现状的选项，看看你有多不想上班 😭</p>
    <form id="quizForm">
      <div class="q">
        <h3>1. 今天早上起床时的感受？</h3>
        <label><input type="radio" name="q1" value="1"> 精力充沛，准备迎接挑战</label>
        <label><input type="radio" name="q1" value="2"> 有点困，但还好</label>
        <label><input type="radio" name="q1" value="3"> 完全不想动，闹钟响了五遍</label>
      </div>
      <div class="q">
        <h3>2. 想到今天的工作内容时，你的心情？</h3>
        <label><input type="radio" name="q2" value="1"> 兴奋，挺有趣的</label>
        <label><input type="radio" name="q2" value="2"> 一般般，没啥特别</label>
        <label><input type="radio" name="q2" value="3"> 想假装自己生病请假</label>
      </div>
      <div class="q">
        <h3>3. 你对同事或上司的感觉？</h3>
        <label><input type="radio" name="q3" value="1"> 氛围不错，大家都挺好</label>
        <label><input type="radio" name="q3" value="2"> 有点烦人但还能忍</label>
        <label><input type="radio" name="q3" value="3"> 一想到就头疼</label>
      </div>
      <div class="q">
        <h3>4. 你对薪水或前景的满意度？</h3>
        <label><input type="radio" name="q4" value="1"> 很满意，值得努力</label>
        <label><input type="radio" name="q4" value="2"> 一般般，有待提升</label>
        <label><input type="radio" name="q4" value="3"> 不满意，纯靠意志力坚持</label>
      </div>
      <div class="q">
        <h3>5. 如果现在让你选择，你会？</h3>
        <label><input type="radio" name="q5" value="1"> 马上去上班</label>
        <label><input type="radio" name="q5" value="2"> 先磨蹭一会儿再说</label>
        <label><input type="radio" name="q5" value="3"> 转身继续睡觉</label>
      </div>
      <button type="button" id="submit">查看评级结果</button>
    </form>

    <div id="result">
      <h2 id="level"></h2>
      <p id="desc"></p>
      <button id="restart">重新测一次</button>
    </div>
  </div>

  <script>
    const form=document.getElementById('quizForm');
    const result=document.getElementById('result');
    const levelEl=document.getElementById('level');
    const descEl=document.getElementById('desc');
    const restartBtn=document.getElementById('restart');

    document.getElementById('submit').addEventListener('click',()=>{
      let total=0,count=0;
      for(let i=1;i<=5;i++){
        const v=document.querySelector(`input[name=q${i}]:checked`);
        if(v){total+=Number(v.value);count++;}
      }
      if(count<5){alert('请完成所有问题再提交！');return;}
      const avg=total/count;
      let level='',desc='';
      if(avg<=1.5){level='🏃‍♀️ 上班能量满满';desc='你今天状态极佳，对工作充满动力！';}
      else if(avg<=2.3){level='😐 有点不想上班';desc='精神一般，可能需要点小激励。试试咖啡或听听喜欢的歌吧。';}
      else{level='😭 严重不想上班';desc='你可能需要休息或调整节奏，别太逼自己啦。';}

      // 动画跳转效果
      form.classList.add('fade-out');
      setTimeout(()=>{
        form.style.display='none';
        levelEl.textContent=level;
        descEl.textContent=desc;
        result.classList.add('show');
        result.scrollIntoView({behavior:'smooth'});
      },600);
    });

    restartBtn.addEventListener('click',()=>{
      // 重置问卷
      form.reset();
      result.classList.remove('show');
      form.style.display='block';
      setTimeout(()=>{form.classList.remove('fade-out');},100);
      window.scrollTo({top:0,behavior:'smooth'});
    });
  </script>
</body>
</html>
