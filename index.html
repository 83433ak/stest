<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SB</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

/* 背景SB水印 */

.watermark{
    position:absolute;
    color:rgba(255,255,255,0.05);
    font-size:40px;
    user-select:none;
}

/* 中间SB */

.center{
    position:absolute;
    top:50%;
    left:50%;
    font-size:120px;
    font-weight:bold;
    color:white;
    transform:translate(-50%,-50%);
    text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff6600,
        0 0 40px #ff9900,
        0 0 80px #ffff00;

    animation:
        heartbeat 1s infinite,
        spin 4s linear infinite;
}

/* 心跳效果 */

@keyframes heartbeat{

    0%{transform:translate(-50%,-50%) scale(1);}
    25%{transform:translate(-50%,-50%) scale(1.2);}
    40%{transform:translate(-50%,-50%) scale(1);}
    60%{transform:translate(-50%,-50%) scale(1.3);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

/* 旋转 */

@keyframes spin{

    from{rotate:0deg;}
    to{rotate:360deg;}

}

/* 炫彩SB粒子 */

.sb{
    position:absolute;
    font-weight:bold;
    animation:fly linear infinite;
}

@keyframes fly{

    from{
        transform:translateY(100vh) rotate(0deg);
        opacity:1;
    }

    to{
        transform:translateY(-100vh) rotate(720deg);
        opacity:0;
    }

}

/* 火焰粒子 */

.fire{
    position:absolute;
    width:6px;
    height:6px;
    background:orange;
    border-radius:50%;
    pointer-events:none;
    animation:fire 1s linear forwards;
}

@keyframes fire{

    from{
        transform:translate(0,0) scale(1);
        opacity:1;
    }

    to{
        transform:translate(var(--x),var(--y)) scale(0);
        opacity:0;
    }

}

</style>
</head>

<body>

<div class="center">SB</div>

<script>

/* 背景SB水印 */

for(let i=0;i<200;i++){

    const w=document.createElement("div")
    w.className="watermark"
    w.innerText="SB"

    w.style.left=Math.random()*window.innerWidth+"px"
    w.style.top=Math.random()*window.innerHeight+"px"

    document.body.appendChild(w)
}

/* 炫彩飞行SB */

function createSB(){

    const sb=document.createElement("div")
    sb.className="sb"
    sb.innerText="SB"

    sb.style.left=Math.random()*window.innerWidth+"px"
    sb.style.fontSize=(20+Math.random()*50)+"px"

    const hue=Math.floor(Math.random()*360)
    sb.style.color="hsl("+hue+",100%,60%)"

    sb.style.animationDuration=(3+Math.random()*5)+"s"

    document.body.appendChild(sb)

    setTimeout(()=>{sb.remove()},8000)
}

setInterval(createSB,120)

/* 火焰粒子 */

const center=document.querySelector(".center")

setInterval(()=>{

    const rect=center.getBoundingClientRect()

    for(let i=0;i<6;i++){

        const f=document.createElement("div")
        f.className="fire"

        f.style.left=rect.left+rect.width/2+"px"
        f.style.top=rect.top+rect.height/2+"px"

        const x=(Math.random()-0.5)*120+"px"
        const y=(Math.random()-1)*140+"px"

        f.style.setProperty("--x",x)
        f.style.setProperty("--y",y)

        document.body.appendChild(f)

        setTimeout(()=>{f.remove()},1000)
    }

},120)

</script>

</body>
</html>
